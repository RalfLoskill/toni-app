<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karte · Toni Business Center</title>
<link rel="stylesheet" href="business.css?v=5">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<div id="bc-gate">
  <div class="login-card">
    <div class="login-logo">T</div>
    <h2>Business Center</h2>
    <p class="login-sub">Bitte mit deinem Vertriebs-Account anmelden.</p>
    <div class="login-field">
      <label for="login-email">E-Mail</label>
      <input id="login-email" type="email" autocomplete="username" placeholder="name@toni.de">
    </div>
    <div class="login-field">
      <label for="login-pass">Passwort</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="login-btn" class="login-btn">Anmelden</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<div class="bc-wrap" id="bc-app" style="display:none">
  <div class="bc-head">
    <div>
      <h1>Institutionen auf der Karte</h1>
      <div class="sub" id="map-sub">Schulen nach Status</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="bc-badge" id="bc-role">–</div>
      <button class="bc-logout" id="bc-logout">Abmelden</button>
    </div>
  </div>

  <nav class="bc-nav" id="bc-nav"></nav>

  <div class="card">
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-status" id="map-status" style="display:none"></div>
    </div>
    <div class="map-legend" id="map-legend"></div>
  </div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="business_common.js?v=3"></script>
<script src="business_map.js?v=1"></script>
</body>
</html>
