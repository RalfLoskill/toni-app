<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Query · Toni Business Center</title>
<link rel="stylesheet" href="business.css?v=15">
</head>
<body>

<div id="bc-gate">
  <div class="login-card">
    <div class="login-logo">T</div>
    <h2>Business Center</h2>
    <p class="login-sub">Bitte mit deinem Vertriebs-Account anmelden.</p>
    <div class="login-field">
      <label for="login-email">E-Mail</label>
      <input id="login-email" type="email" autocomplete="username" placeholder="name@toni.de">
    </div>
    <div class="login-field">
      <label for="login-pass">Passwort</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="login-btn" class="login-btn">Anmelden</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<div class="bc-wrap" id="bc-app" style="display:none">
  <div class="bc-head">
    <div>
      <h1>Query</h1>
      <div class="sub">Gefundene Schulen — prüfen und als Leads übernehmen</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="bc-badge" id="bc-role">–</div>
      <button class="bc-logout" id="bc-logout">Abmelden</button>
    </div>
  </div>

  <nav class="bc-nav" id="bc-nav"></nav>

  <div class="searchbar">
    <input id="q" type="search" placeholder="Nach Name oder Ort suchen …">
    <select id="status-filter">
      <option value="new">Neu</option>
      <option value="accepted">Übernommen</option>
      <option value="discarded">Verworfen</option>
      <option value="">Alle</option>
    </select>
    <span class="spacer" style="flex:1"></span>
    <button class="btn ghost" id="q-discard" style="display:none">Ausgewählte verwerfen</button>
    <button class="btn" id="q-accept" style="display:none">Ausgewählte als Leads übernehmen</button>
  </div>

  <div class="card">
    <table class="bc-tbl">
      <thead><tr>
        <th style="width:34px"><input type="checkbox" id="q-all"></th>
        <th>Name</th><th>Ort</th><th>Kontakte</th><th>Herkunft</th><th>Status</th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="6"><span class="spin"></span></td></tr></tbody>
    </table>
    <div id="list-empty"></div>
  </div>
  <div id="q-msg" class="login-msg"></div>
</div>

<!-- Modal: Detail eines Query-Eintrags -->
<div class="modal-back" id="q-modal" style="display:none">
  <div class="modal">
    <h3 id="qm-title">Fund</h3>
    <div id="qm-body"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="qm-close">Schließen</button>
    </div>
  </div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="business_common.js?v=10"></script>
<script src="business_query.js?v=3"></script>
</body>
</html>
