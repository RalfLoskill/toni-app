<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Institutionen · Toni Business Center</title>
<link rel="stylesheet" href="business.css?v=8">
</head>
<body>

<div id="bc-gate">
  <div class="login-card">
    <div class="login-logo">T</div>
    <h2>Business Center</h2>
    <p class="login-sub">Bitte mit deinem Vertriebs-Account anmelden.</p>
    <div class="login-field">
      <label for="login-email">E-Mail</label>
      <input id="login-email" type="email" autocomplete="username" placeholder="name@toni.de">
    </div>
    <div class="login-field">
      <label for="login-pass">Passwort</label>
      <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="login-btn" class="login-btn">Anmelden</button>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<div class="bc-wrap" id="bc-app" style="display:none">
  <div class="bc-head">
    <div>
      <h1>Institutionen</h1>
      <div class="sub">Schulen, Interessenten und Kunden</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="bc-badge" id="bc-role">–</div>
      <button class="bc-logout" id="bc-logout">Abmelden</button>
    </div>
  </div>

  <nav class="bc-nav" id="bc-nav"></nav>

  <div class="searchbar">
    <input id="q" type="search" placeholder="Nach Name oder Ort suchen …">
    <select id="status-filter">
      <option value="">Alle Status</option>
      <option value="prospect">Interessent</option>
      <option value="test_customer">Testphase</option>
      <option value="customer">Kunde</option>
      <option value="former_customer">Ehemaliger Kunde</option>
      <option value="partner">Partner</option>
    </select>
    <button class="btn" id="new-btn">+ Neue Schule</button>
  </div>

  <div class="card">
    <table class="bc-tbl">
      <thead><tr>
        <th>Name</th><th>Typ</th><th>Ort</th><th>Stufe</th><th style="text-align:right">Dealwert</th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="5"><span class="spin"></span></td></tr></tbody>
    </table>
    <div id="list-empty"></div>
  </div>
</div>

<!-- Modal: neue Schule -->
<div class="modal-back" id="new-modal" style="display:none">
  <div class="modal">
    <h3>Neue Schule anlegen</h3>
    <div class="field">
      <label for="f-name">Name *</label>
      <input id="f-name" type="text" placeholder="z. B. Berufskolleg Musterstadt">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-type">Schulform</label>
        <select id="f-type">
          <option value="">–</option>
          <option value="berufskolleg">Berufskolleg</option>
          <option value="berufsschule">Berufsschule</option>
          <option value="gymnasium">Gymnasium</option>
          <option value="gesamtschule">Gesamtschule</option>
          <option value="realschule">Realschule</option>
          <option value="hauptschule">Hauptschule</option>
          <option value="grundschule">Grundschule</option>
          <option value="foerderschule">Förderschule</option>
          <option value="hochschule">Hochschule</option>
          <option value="schultraeger">Schulträger</option>
          <option value="ministerium">Ministerium</option>
          <option value="sonstige">Sonstige</option>
        </select>
      </div>
      <div class="field">
        <label for="f-country">Land</label>
        <select id="f-country"></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-state">Bundesland</label>
        <select id="f-state"></select>
      </div>
      <div class="field"><label for="f-city">Ort</label><input id="f-city" type="text"></div>
    </div>
    <div class="field-row">
      <div class="field"><label for="f-postal">PLZ</label><input id="f-postal" type="text"></div>
      <div class="field"><label for="f-street">Straße</label><input id="f-street" type="text"></div>
    </div>
    <div class="field"><label for="f-website">Website</label><input id="f-website" type="text" placeholder="https://…"></div>
    <div id="new-msg" class="login-msg"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="new-cancel">Abbrechen</button>
      <button class="btn" id="new-save">Anlegen</button>
    </div>
  </div>
</div>

<script src="/api/config"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="business_common.js?v=7"></script>
<script src="business_institutions.js?v=3"></script>
</body>
</html>
